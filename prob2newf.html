<!DOCTYPE html>
<html>
<head>
<title>Autorickshaw Odyssey</title>

<style>

body{
margin:0;
overflow:hidden;
background:#1b1b1b;
font-family:Arial;
}

/* GAME AREA */

#game{
width:400px;
height:700px;
background:#555;
margin:auto;
position:relative;
overflow:hidden;
border:4px solid white;
}

/* ROAD LINE */

.lane{
position:absolute;
width:6px;
height:100%;
background:white;
left:50%;
}

/* TREES */

.tree{
position:absolute;
width:20px;
height:60px;
background:brown;
bottom:0;
}

.tree:after{
content:"";
position:absolute;
width:40px;
height:40px;
background:green;
border-radius:50%;
left:-10px;
top:-25px;
}

/* TRAFFIC SIGNAL */

.signal{
position:absolute;
width:15px;
height:40px;
background:black;
top:80px;
}

.light{
width:10px;
height:10px;
border-radius:50%;
margin:2px auto;
}

.red{background:red;}
.yellow{background:yellow;}
.green{background:lime;}

/* PLAYER AUTO */

#player{
width:60px;
height:60px;
background:yellow;
position:absolute;
bottom:20px;
left:170px;
border-radius:10px;
border-top:20px solid black;
}

#player:before{
content:"";
position:absolute;
width:12px;
height:12px;
background:black;
border-radius:50%;
bottom:-6px;
left:8px;
}

#player:after{
content:"";
position:absolute;
width:12px;
height:12px;
background:black;
border-radius:50%;
bottom:-6px;
right:8px;
}

/* CARS */

.car{
width:40px;
height:70px;
position:absolute;
top:-80px;
border-radius:6px;
}

.car:before{
content:"";
position:absolute;
width:30px;
height:20px;
background:#222;
top:10px;
left:5px;
border-radius:3px;
}

/* COINS */

.coin{
width:25px;
height:25px;
background:gold;
border-radius:50%;
position:absolute;
top:-80px;
box-shadow:0 0 10px gold;
}

/* SCOREBOARD */

#scoreboard{
color:white;
text-align:center;
font-size:18px;
margin-top:10px;
}

/* BUTTONS */

#controls{
text-align:center;
margin-top:10px;
}

button{
font-size:18px;
padding:10px 20px;
margin:5px;
}

/* PAUSE TEXT */

#pauseText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:40px;
display:none;
}

</style>
</head>

<body>

<div id="scoreboard">
Score: <span id="score">0</span> |
Distance: <span id="distance">0</span>
</div>

<div id="game">

<div class="lane"></div>
<div id="player"></div>
<div id="pauseText">PAUSED</div>

<!-- TREES -->
<div class="tree" style="left:5px"></div>
<div class="tree" style="left:370px"></div>

<!-- TRAFFIC SIGNAL -->
<div class="signal" style="left:10px">
<div class="light red"></div>
<div class="light yellow"></div>
<div class="light green"></div>
</div>

<div class="signal" style="right:10px">
<div class="light red"></div>
<div class="light yellow"></div>
<div class="light green"></div>
</div>

</div>

<div id="controls">
<button onclick="moveLeft()">⬅ LEFT</button>
<button onclick="togglePause()">⏸ PAUSE</button>
<button onclick="moveRight()">RIGHT ➡</button>
</div>

<script>

let player=document.getElementById("player")
let game=document.getElementById("game")
let pauseText=document.getElementById("pauseText")

let score=0
let distance=0
let speed=3

let playerX=170

let cars=[]
let coins=[]

let paused=false

let colors=["red","blue","orange","purple","cyan","pink"]

document.addEventListener("keydown",movePlayer)

function movePlayer(e){

if(e.key=="ArrowLeft") moveLeft()
if(e.key=="ArrowRight") moveRight()

if(e.code==="Space"){
togglePause()
}

}

function moveLeft(){

if(paused)return

if(playerX>0){
playerX-=20
player.style.left=playerX+"px"
}

}

function moveRight(){

if(paused)return

if(playerX<340){
playerX+=20
player.style.left=playerX+"px"
}

}

function togglePause(){

paused=!paused

if(paused){
pauseText.style.display="block"
}else{
pauseText.style.display="none"
}

}

function spawnObject(){

let x=Math.random()*360

if(Math.random()<0.7){

let car=document.createElement("div")
car.className="car"

let color=colors[Math.floor(Math.random()*colors.length)]
car.style.background=color

car.style.left=x+"px"

game.appendChild(car)

cars.push(car)

}else{

let coin=document.createElement("div")
coin.className="coin"
coin.style.left=x+"px"

game.appendChild(coin)

coins.push(coin)

}

}

function restartGame(){

score=0
distance=0
speed=3

document.getElementById("score").innerText=0
document.getElementById("distance").innerText=0

playerX=170
player.style.left=playerX+"px"

cars.forEach(c=>c.remove())
coins.forEach(c=>c.remove())

cars=[]
coins=[]

}

function gameLoop(){

if(!paused){

distance++

if(distance%600==0){
speed+=0.5
}

document.getElementById("distance").innerText=distance

if(Math.random()<0.03){
spawnObject()
}

let playerRect=player.getBoundingClientRect()

cars.forEach((car,index)=>{

let top=parseFloat(car.style.top||-80)

top+=speed
car.style.top=top+"px"

let rect=car.getBoundingClientRect()

if(
rect.left<playerRect.right &&
rect.right>playerRect.left &&
rect.top<playerRect.bottom &&
rect.bottom>playerRect.top
){

alert("Crash! Score: "+score)
restartGame()

}

if(top>700){
car.remove()
cars.splice(index,1)
}

})

coins.forEach((coin,index)=>{

let top=parseFloat(coin.style.top||-80)

top+=speed
coin.style.top=top+"px"

let rect=coin.getBoundingClientRect()

if(
rect.left<playerRect.right &&
rect.right>playerRect.left &&
rect.top<playerRect.bottom &&
rect.bottom>playerRect.top
){

score+=10
document.getElementById("score").innerText=score

coin.remove()
coins.splice(index,1)

}

if(top>700){
coin.remove()
coins.splice(index,1)
}

})

}

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
